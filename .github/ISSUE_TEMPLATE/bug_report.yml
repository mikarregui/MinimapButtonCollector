name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report. Please fill in as much as you can — it helps a lot.

  - type: input
    id: version
    attributes:
      label: Addon version
      description: The version you have installed (check the AddOns menu or the ZIP name).
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: input
    id: client
    attributes:
      label: WoW client build
      description: Run `/run print((GetBuildInfo()))` in-game to get it.
      placeholder: "2.5.5.54999 (Interface 20505)"
    validations:
      required: true

  - type: textarea
    id: addons
    attributes:
      label: Other installed addons
      description: Especially anything that touches the minimap (Atlas, Bagnon, Details, Gargul, MoveAny, SexyMap, etc.).
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Be as specific as you can.
      placeholder: |
        1. Login
        2. Wait 10 seconds
        3. Click the trigger button
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Lua error (if any)
      description: Paste the output from BugSack or on-screen error.
      render: lua
